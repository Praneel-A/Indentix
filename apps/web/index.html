<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          document.documentElement.classList.remove("dark");
          localStorage.setItem("indentix-theme", "light");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/indentix-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/indentix-logo.png" />
    <title>Indentix</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
